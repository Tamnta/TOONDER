<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toonder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TOONDER</h1>
        <p>Encuentra tu próximo "match" de lectura</p>
    </header>

    <main>
        <!-- Buscador Tipo Google -->
        <section class="search-container">
            <input type="text" id="search-input" placeholder="Escribe hashtags ej: #fantasy, #angst...">
            <button id="search-btn">Buscar</button>
        </section>

        <!-- Contenedor donde JavaScript va a "pintar" los resultados -->
        <section id="results-container" class="results-grid">
            <!-- Las tarjetas de los webtoons aparecerán aquí automáticamente -->
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
